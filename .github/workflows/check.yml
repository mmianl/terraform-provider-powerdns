name: Check

on:
  pull_request:

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Format
        run: make fmtcheck

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
  
  mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure go.mod tidy and vendor are clean
        run: |
          go mod tidy
          go mod vendor
          if ! git diff --exit-code; then
            echo "ERROR: go.mod, go.sum, or vendor directory are not up-to-date."
            echo "Run: go mod tidy && go mod vendor"
            exit 1
          fi

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Run Tests
        run: |
          make test

  acc-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Start PowerDNS
        working-directory: acc-tests
        run: docker compose up -d

      - name: Wait for PowerDNS to be healthy
        run: |
          while true; do
            STATUS="$(docker inspect --format='{{.State.Health.Status}}' pdns-health 2>/dev/null || echo "starting")"
            if [ "$STATUS" = "healthy" ]; then
              echo "PowerDNS is healthy!"
              break
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "PowerDNS is UNHEALTHY!"
              docker compose -f acc-tests/docker-compose.yml logs
              exit 1
            fi
            sleep 5
          done

      - name: Run Acceptance Tests
        env:
          PDNS_SERVER_URL: http://localhost:8081
          PDNS_RECURSOR_SERVER_URL: http://localhost:8082
          PDNS_API_KEY: testapikey
        run: |
          terraform version
          export TF_ACC_TERRAFORM_PATH="$(which terraform)"
          make testacc

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Run E2E tests
        timeout-minutes: 2
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o e2e-tests/terraform-provider-powerdns .
          chmod +x e2e-tests/run-e2e-tests.sh
          cd e2e-tests && ./run-e2e-tests.sh
